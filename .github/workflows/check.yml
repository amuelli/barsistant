name: Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install npm scripts needed by Next.js
        run: deno install --allow-scripts=npm:sharp

      - name: Refresh Convex generated bindings
        run: deno task convex:codegen

      - name: Check formatting
        run: deno task fmt

      - name: Run lint
        run: deno task lint

      - name: Run tests
        run: deno task test

      - name: Run typecheck
        run: deno task typecheck

      - name: Build app
        run: deno task build

      - name: Run startup smoke health check
        run: deno task smoke:health
